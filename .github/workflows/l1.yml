{
  "name": "L1 routing",
  "on": {
    "pull_request": {},
    "push": {
      "branches": ["main"]
    }
  },
  "permissions": {
    "contents": "read"
  },
  "jobs": {
    "offline-l1": {
      "name": "L1 routing (${{ matrix.os }})",
      "strategy": {
        "fail-fast": false,
        "matrix": {
          "os": ["ubuntu-24.04", "windows-2022"]
        }
      },
      "runs-on": "${{ matrix.os }}",
      "timeout-minutes": 10,
      "steps": [
        {
          "name": "Check out repository",
          "uses": "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683",
          "with": {
            "fetch-depth": 2,
            "persist-credentials": false
          }
        },
        {
          "name": "Fetch immutable baseline",
          "run": "git fetch --no-tags --depth=1 origin e5b45dd2330b1ba781d9da0f80211dd657d854cf\ngit cat-file -e e5b45dd2330b1ba781d9da0f80211dd657d854cf"
        },
        {
          "name": "Set up Python",
          "uses": "actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065",
          "with": {
            "python-version": "3.11.9"
          }
        },
        {
          "name": "Run unit tests",
          "run": "python -m unittest discover -s tests -v"
        },
        {
          "name": "Run deterministic L1 fixtures",
          "run": "python -m evals.runner evals/l1-routing.yaml"
        },
        {
          "name": "Validate canonical JSON documents",
          "run": "python -m json.tool routing.yaml\npython -m json.tool schemas/task-envelope.schema.json\npython -m json.tool schemas/role-registry.schema.json\npython -m json.tool schemas/ledger-record.schema.json\npython -m json.tool schemas/delegation-spec.schema.json\npython -m json.tool schemas/eval-fixture.schema.json\npython -m json.tool evals/l1-routing.yaml"
        },
        {
          "name": "Compile Python sources",
          "run": "python -m compileall -q router runtime evals tests"
        },
        {
          "name": "Check committed diff whitespace",
          "run": "git diff --check HEAD^1..HEAD"
        }
      ]
    },
    "l1-gate": {
      "name": "L1 routing gate",
      "if": "${{ always() }}",
      "needs": ["offline-l1"],
      "runs-on": "ubuntu-24.04",
      "timeout-minutes": 2,
      "steps": [
        {
          "name": "Require all L1 matrix jobs",
          "env": {
            "MATRIX_RESULT": "${{ needs.offline-l1.result }}"
          },
          "run": "test \"$MATRIX_RESULT\" = \"success\""
        }
      ]
    }
  }
}
